<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Sejuk | Premium Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f0f0f; color: #ffffff; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card-gradient { background: linear-gradient(145deg, #1e1e1e, #141414); border: 1px solid rgba(255, 255, 255, 0.03); }
        .orange-glow { box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 0px; }
        .menu-item { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .menu-item:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-32">

    <nav class="sticky top-0 z-50 glass px-6 py-5 flex justify-between items-center">
        <div>
            <h1 class="font-black text-2xl tracking-tighter text-orange-500">KOPI<span class="text-white">SEJUK.</span></h1>
            <p class="text-[8px] tracking-[0.2em] text-stone-500 font-bold uppercase">Digital Ordering System</p>
        </div>
        <input type="text" id="searchMenu" onkeyup="filterMenu()" placeholder="Cari menu..." class="bg-stone-900/50 border border-stone-800 text-[11px] py-2.5 px-5 rounded-full focus:outline-none focus:border-orange-500 w-32 focus:w-44 transition-all text-white">
    </nav>

    <header class="px-6 pt-6 pb-2">
        <div class="relative rounded-[2.5rem] p-8 overflow-hidden min-h-[180px] flex flex-col justify-center shadow-2xl">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1000" class="absolute inset-0 w-full h-full object-cover opacity-40 scale-110 brightness-50">
            <div class="relative z-10">
                <span class="bg-orange-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Premium Coffee</span>
                <h2 class="text-3xl font-extrabold leading-tight tracking-tighter mt-3 mb-4 text-white">Awali Harimu <br>Dengan Ketenangan.</h2>
                <div class="flex gap-2">
                    <div class="h-1 w-8 bg-orange-500 rounded-full"></div>
                    <div class="h-1 w-2 bg-stone-700 rounded-full"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex gap-3 px-6 py-6 overflow-x-auto no-scrollbar">
        <button class="bg-orange-500 text-white px-6 py-2.5 rounded-full text-[11px] font-black shadow-lg shadow-orange-500/20 whitespace-nowrap">SIGNATURE</button>
        <button class="bg-stone-900 text-stone-400 px-6 py-2.5 rounded-full text-[11px] font-black border border-stone-800 whitespace-nowrap">NON-COFFEE</button>
        <button class="bg-stone-900 text-stone-400 px-6 py-2.5 rounded-full text-[11px] font-black border border-stone-800 whitespace-nowrap">SNACKS</button>
    </div>

    <div id="menuContainer" class="px-6 grid gap-5">
        <div class="menu-item card-gradient p-4 rounded-[2.5rem] flex items-center gap-5 shadow-xl" data-name="Kopi Susu Aren">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1599398054066-846f28917f38?q=80&w=200" class="w-24 h-24 rounded-[2rem] object-cover orange-glow">
                <div class="absolute -top-1 -right-1 bg-orange-500 w-6 h-6 rounded-full flex items-center justify-center border-4 border-[#0f0f0f]">
                    <div class="w-1 h-1 bg-white rounded-full"></div>
                </div>
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-base text-stone-100">Kopi Susu Aren</h3>
                <p class="text-stone-500 text-[10px] mb-2 font-medium uppercase tracking-tighter italic">Signature House Blend</p>
                <div class="flex justify-between items-center">
                    <p class="text-orange-500 font-black text-sm tracking-tight">IDR 18.000</p>
                    <button onclick="addToCart('Kopi Susu Aren', 18000)" class="bg-white text-black w-9 h-9 rounded-2xl flex items-center justify-center font-black text-xl hover:bg-orange-500 hover:text-white transition-colors">+</button>
                </div>
            </div>
        </div>

        <div class="menu-item card-gradient p-4 rounded-[2.5rem] flex items-center gap-5 shadow-xl" data-name="Americano Ice">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?q=80&w=200" class="w-24 h-24 rounded-[2rem] object-cover">
            </div>
            <div class="flex-1">
                <h3 class="font-bold text-base text-stone-100">Americano Ice</h3>
                <p class="text-stone-500 text-[10px] mb-2 font-medium uppercase tracking-tighter italic">Pure Black & Chill</p>
                <div class="flex justify-between items-center">
                    <p class="text-orange-500 font-black text-sm tracking-tight">IDR 15.000</p>
                    <button onclick="addToCart('Americano Ice', 15000)" class="bg-white text-black w-9 h-9 rounded-2xl flex items-center justify-center font-black text-xl">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="checkoutModal" class="fixed inset-0 z-[100] bg-black/80 hidden flex items-end animate-fade-in">
        <div class="w-full bg-[#121212] rounded-t-[3rem] p-10 border-t border-stone-800 max-h-[85vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-stone-800 rounded-full mx-auto mb-8"></div>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black tracking-tighter">ORDER DETAIL</h2>
                <button onclick="toggleModal()" class="text-stone-600 bg-stone-900 w-10 h-10 rounded-full flex items-center justify-center font-bold">×</button>
            </div>

            <div id="cartList" class="space-y-4 mb-8"></div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <input type="text" id="custName" placeholder="NAMA ANDA" class="bg-stone-900 border border-stone-800 p-5 rounded-[1.5rem] text-sm font-bold focus:border-orange-500 outline-none text-white">
                <input type="number" id="custTable" placeholder="MEJA" class="bg-stone-900 border border-stone-800 p-5 rounded-[1.5rem] text-sm font-bold focus:border-orange-500 outline-none text-white">
            </div>

            <div class="flex justify-between items-center p-6 rounded-[2rem] border border-orange-500/30 bg-orange-500/5 mb-10">
                <span class="font-bold text-stone-400">Total Pembayaran</span>
                <span id="finalPrice" class="text-2xl font-black text-orange-500">Rp 0</span>
            </div>

            <button onclick="submitOrder()" class="w-full bg-orange-500 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-2xl shadow-orange-500/30 active:scale-95 transition-all">ORDER SEKARANG</button>
        </div>
    </div>

    <div id="floatingCart" class="fixed bottom-0 left-0 w-full p-8 z-40 hidden">
        <button onclick="toggleModal()" class="w-full bg-white text-black py-5 rounded-[2rem] font-black shadow-2xl flex justify-between px-10 items-center">
            <div class="flex items-center gap-4">
                <span id="cartCount" class="bg-orange-500 text-white text-[10px] px-3 py-1.5 rounded-xl">0</span>
                <span class="text-[11px] tracking-widest uppercase">CHECKOUT</span>
            </div>
            <span id="totalPrice" class="text-sm tracking-tight">Rp 0</span>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAuo0evyLZRvqWSYwUxP30ET01ZPGoqJ4",
            authDomain: "kopi-sejuk.firebaseapp.com",
            databaseURL: "https://kopi-sejuk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kopi-sejuk",
            storageBucket: "kopi-sejuk.firebasestorage.app",
            messagingSenderId: "911072415848",
            appId: "1:911072415848:web:ae88ae6ae15250a1f42bdd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = {};

        function addToCart(name, price) {
            if (!cart[name]) cart[name] = { qty: 0, price: price };
            cart[name].qty++;
            renderUI();
        }

        function updateQty(name, change) {
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            renderUI();
        }

        function renderUI() {
            let count = 0, total = 0, listHtml = '';
            for (let i in cart) {
                count += cart[i].qty;
                total += cart[i].qty * cart[i].price;
                listHtml += `
                    <div class="flex justify-between items-center bg-stone-900/50 p-5 rounded-[1.5rem] border border-stone-800">
                        <div>
                            <p class="font-bold text-sm text-stone-200">${i}</p>
                            <p class="text-[10px] text-orange-500 font-bold">x ${cart[i].qty}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQty('${i}', -1)" class="w-8 h-8 rounded-xl bg-stone-800 text-white font-bold">-</button>
                            <button onclick="updateQty('${i}', 1)" class="w-8 h-8 rounded-xl bg-orange-500 text-white font-bold">+</button>
                        </div>
                    </div>`;
            }
            document.getElementById('floatingCart').style.display = count > 0 ? 'block' : 'none';
            document.getElementById('cartCount').innerText = count;
            document.getElementById('totalPrice').innerText = 'Rp ' + total.toLocaleString('id-ID');
            document.getElementById('finalPrice').innerText = 'Rp ' + total.toLocaleString('id-ID');
            document.getElementById('cartList').innerHTML = listHtml || '<p class="text-center text-stone-600 text-xs py-10 italic">Keranjang kosong.</p>';
            window.lastTotal = total;
        }

        function toggleModal() { document.getElementById('checkoutModal').classList.toggle('hidden'); }
        
        function filterMenu() {
            let input = document.getElementById('searchMenu').value.toLowerCase();
            document.querySelectorAll('.menu-item').forEach(item => {
                item.style.display = item.getAttribute('data-name').toLowerCase().includes(input) ? 'flex' : 'none';
            });
        }

        function submitOrder() {
            const name = document.getElementById('custName').value;
            const table = document.getElementById('custTable').value;
            if (!name || !table) return alert("Lengkapi Nama & No Meja!");

            const orderId = "ORD-" + Date.now();
            const orderData = {
                id: orderId, customer: name, table: table,
                items: cart, total: window.lastTotal,
                status: "Pending", timestamp: Date.now()
            };

            db.ref('orders/' + orderId).set(orderData).then(() => {
                showStruk(orderData);
                cart = {};
                renderUI();
            });
        }

        function showStruk(data) {
            const modalBody = document.querySelector('#checkoutModal div');
            modalBody.innerHTML = `
                <div class="p-8 bg-white text-black rounded-[2rem]" style="font-family:monospace;">
                    <center>
                        <h2 class="font-black text-2xl">KOPI SEJUK</h2>
                        <p class="text-[10px] tracking-widest uppercase">Thank You For Coming</p>
                        <div class="border-b border-dashed border-black my-4"></div>
                    </center>
                    <div class="text-xs space-y-1 mb-4">
                        <p>ORDER ID : ${data.id}</p>
                        <p>NAME     : ${data.customer.toUpperCase()}</p>
                        <p>TABLE    : ${data.table}</p>
                    </div>
                    <div class="border-b border-dashed border-black my-4"></div>
                    <div class="text-xs uppercase">${Object.keys(data.items).map(i => `<p>${i} x${data.items[i].qty}</p>`).join('')}</div>
                    <div class="border-b border-dashed border-black my-4"></div>
                    <p class="font-black text-right text-lg uppercase">TOTAL : Rp ${data.total.toLocaleString('id-ID')}</p>
                    <p class="mt-8 text-center text-[10px] leading-relaxed">SILAKAN LAKUKAN PEMBAYARAN <br> DI KASIR BARISTA KAMI.</p>
                </div>
                <button onclick="location.reload()" class="w-full mt-8 bg-orange-500 text-white py-5 rounded-[2rem] font-black">BACK TO MENU</button>
            `;
        }
        window.onload = renderUI;
    </script>
</body>
</html>
