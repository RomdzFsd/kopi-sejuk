                </div>
            </div>

            <div class="flex justify-between items-center bg-orange-50 p-6 rounded-[2rem] mb-8">

            </div>

            <button onclick="submitOrder()" class="w-full bg-orange-500 text-white py-5 rounded-full font-extrabold shadow-xl uppercase tracking-widest active:scale-95 transition">Kirim ke Barista</button>
        </div>

    <div id="floatingCart" class="fixed bottom-0 left-0 w-full p-6 z-40 hidden">
        <button onclick="toggleModal()" class="w-full bg-stone-900 text-white py-5 rounded-full font-extrabold shadow-2xl flex justify-between px-8 items-center">
            <div class="flex items-center gap-3">
                <span id="cartCount" class="bg-orange-500 text-[10px] px-2 py-1 rounded-md">0</span>
                <span class="text-[11px] uppercase tracking-widest">Lihat Keranjang</span>
            </div>
            <span id="totalPrice" class="text-sm">Rp 0</span>
        </button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('kopi_cart')) || {};

        function addToCart(name, price) {
            if (!cart[name]) cart[name] = { qty: 0, price: price };
            cart[name].qty++;
            saveAndRefresh();
        }

        function updateQty(name, change) {
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('kopi_cart', JSON.stringify(cart));
            renderUI();
        }

        function renderUI() {
            let count = 0;
            let total = 0;
            let listHtml = '';

            for (let item in cart) {
                count += cart[item].qty;
                total += cart[item].qty * cart[item].price;
                listHtml += `
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-extrabold text-sm">${item}</p>
                            <p class="text-[10px] text-stone-400">Rp ${cart[item].price.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="updateQty('${item}', -1)" class="w-8 h-8 rounded-full bg-stone-100 font-bold">-</button>
                            <span class="font-bold text-sm">${cart[item].qty}</span>
                            <button onclick="updateQty('${item}', 1)" class="w-8 h-8 rounded-full bg-stone-100 font-bold">+</button>
                        </div>
                    </div>`;
            }

            document.getElementById('floatingCart').style.display = count > 0 ? 'block' : 'none';
            document.getElementById('cartCount').innerText = count;
            document.getElementById('totalPrice').innerText = 'Rp ' + total.toLocaleString('id-ID');
            document.getElementById('finalPrice').innerText = 'Rp ' + total.toLocaleString('id-ID');
            document.getElementById('cartList').innerHTML = listHtml || '<p class="text-center text-stone-400 text-xs">Keranjang masih kosong...</p>';
        }

        function toggleModal() {
            document.getElementById('checkoutModal').classList.toggle('hidden');
        }

        function filterMenu() {
            let input = document.getElementById('searchMenu').value.toLowerCase();
            let items = document.querySelectorAll('.menu-item');
            items.forEach(item => {
                let name = item.getAttribute('data-name').toLowerCase();
                item.style.display = name.includes(input) ? 'flex' : 'none';
            });
        }

  // Ganti bagian submitOrder yang lama
function submitOrder() {
    const name = document.getElementById('custName').value;
    const table = document.getElementById('custTable').value;
    if (!name || !table) return alert("Isi Nama & No Meja dulu!");

    const orderId = "ORD-" + Date.now();
    const orderData = {
        id: orderId,
        customer: name,
        table: table,
        items: cart,
        total: totalPrice,
        status: "Pending", // Status awal
        timestamp: Date.now()
    };

    // 1. KIRIM KE FIREBASE (Agar Penjual Bisa Lihat)
    firebase.database().ref('orders/' + orderId).set(orderData)
    .then(() => {
        alert("Pesanan terkirim ke sistem! Menampilkan struk...");
        showStruk(orderData); // Tampilkan struk digital
    })
    .catch((error) => alert("Gagal kirim: " + error.message));
}
