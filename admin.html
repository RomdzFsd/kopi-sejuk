<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Sejuk | Barista Dash & Shift Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0a; color: white; }
        .order-card { transition: all 0.3s ease; border: 1px solid #1f1f1f; }
        .status-pending { border-left: 6px solid #f97316; }
        .animate-pop { animation: pop 0.4s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .glass-panel { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-reset { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-reset:hover { background: #ef4444; color: white; }
    </style>
</head>
<body class="p-6 pb-32">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter uppercase">Barista Dash.</h1>
            <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">• Shift Monitoring Active</p>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="resetShift()" class="btn-reset text-[10px] font-black px-5 py-3 rounded-2xl transition-all uppercase tracking-widest">
                Reset Shift
            </button>
            <div class="glass-panel p-4 rounded-3xl flex flex-col items-end min-w-[180px]">
                <span class="text-[8px] font-bold text-stone-500 uppercase tracking-widest mb-1">Omzet Shift Ini</span>
                <span id="totalOmzet" class="text-2xl font-black text-green-500 tracking-tight">Rp 0</span>
            </div>
        </div>
    </header>

    <div class="mb-6 flex items-center gap-3">
        <span class="bg-orange-500 w-2 h-6 rounded-full"></span>
        <h2 class="font-black text-sm uppercase tracking-widest">Pesanan Masuk</h2>
        <span id="activeCount" class="text-[10px] bg-stone-900 px-3 py-1 rounded-full text-stone-400">0</span>
    </div>
    
    <div id="orderList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3 mb-16">
        </div>

    <div class="mb-6 flex items-center gap-3">
        <span class="bg-green-500 w-2 h-6 rounded-full"></span>
        <h2 class="font-black text-sm uppercase tracking-widest">Riwayat Shift Ini</h2>
    </div>

    <div class="glass-panel rounded-[2.5rem] overflow-hidden">
        <table class="w-full text-left text-xs">
            <thead class="bg-stone-900/50 text-stone-500 uppercase font-bold">
                <tr>
                    <th class="p-5 text-[10px]">Pelanggan</th>
                    <th class="p-5 text-[10px]">Meja</th>
                    <th class="p-5 text-[10px] text-right">Total</th>
                </tr>
            </thead>
            <tbody id="historyTable" class="divide-y divide-stone-900">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAuo0evyLZRvqWSYwUxP30ET01ZPGoqJ4",
            authDomain: "kopi-sejuk.firebaseapp.com",
            databaseURL: "https://kopi-sejuk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kopi-sejuk",
            storageBucket: "kopi-sejuk.firebasestorage.app",
            messagingSenderId: "911072415848",
            appId: "1:911072415848:web:ae88ae6ae15250a1f42bdd"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. MONITORING REALTIME
        db.ref('orders').on('value', (snapshot) => {
            const data = snapshot.val();
            const orderList = document.getElementById('orderList');
            const historyTable = document.getElementById('historyTable');
            const omzetEl = document.getElementById('totalOmzet');
            const activeCountEl = document.getElementById('activeCount');

            orderList.innerHTML = '';
            historyTable.innerHTML = '';
            
            let totalOmzet = 0;
            let activeOrders = 0;

            if (data) {
                const keys = Object.keys(data).reverse();

                keys.forEach(id => {
                    const order = data[id];

                    if (order.status !== 'Selesai') {
                        activeOrders++;
                        let itemsHtml = '';
                        for(let item in order.items) {
                            itemsHtml += `<p class="text-[11px] text-stone-400">${item} x${order.items[item].qty}</p>`;
                        }

                        orderList.innerHTML += `
                            <div class="order-card bg-[#141414] p-6 rounded-[2.5rem] shadow-2xl animate-pop status-pending">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 class="font-black text-lg uppercase">${order.customer}</h3>
                                        <p class="text-orange-500 font-bold text-[10px] uppercase">Meja: ${order.table}</p>
                                    </div>
                                    <span class="text-[9px] text-stone-600 font-bold italic">Baru</span>
                                </div>
                                <div class="space-y-1 mb-6 py-4 border-y border-stone-900">${itemsHtml}</div>
                                <div class="flex justify-between items-center">
                                    <span class="font-black text-white">Rp ${order.total.toLocaleString('id-ID')}</span>
                                    <button onclick="updateStatus('${id}', 'Selesai')" class="bg-white text-black px-6 py-2.5 rounded-full text-[10px] font-black uppercase hover:bg-orange-500 hover:text-white transition-all">Selesai</button>
                                </div>
                            </div>`;
                    } else {
                        totalOmzet += order.total;
                        historyTable.innerHTML += `
                            <tr>
                                <td class="p-5 font-bold uppercase">${order.customer}</td>
                                <td class="p-5 text-stone-500">Meja ${order.table}</td>
                                <td class="p-5 text-right font-black text-green-500 italic">Rp ${order.total.toLocaleString('id-ID')}</td>
                            </tr>`;
                    }
                });

                omzetEl.innerText = 'Rp ' + totalOmzet.toLocaleString('id-ID');
                activeCountEl.innerText = activeOrders;
                
                if (activeOrders === 0) orderList.innerHTML = '<p class="text-stone-800 italic text-sm py-10 w-full text-center">Dapur kosong...</p>';
                if (totalOmzet === 0) historyTable.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-stone-700 italic">Belum ada transaksi selesai di shift ini.</td></tr>';
            }
        });

        // 2. FUNGSI UPDATE STATUS
        window.updateStatus = (id, status) => db.ref('orders/' + id).update({ status: status });

        // 3. FUNGSI RESET SHIFT (Sangat penting buat Barista)
        window.resetShift = () => {
            const konfirmasi = confirm("RESET SHIFT?\nSemua riwayat closingan shift ini akan dihapus. Pastikan uang laci sudah sesuai rekapan.");
            
            if (konfirmasi) {
                const pin = prompt("Masukkan PIN Konfirmasi Shift (Default: 1234):");
                if (pin === '1234') { // PIN BISA DIGANTI DISINI
                    db.ref('orders').once('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            Object.keys(data).forEach(id => {
                                if (data[id].status === 'Selesai') {
                                    db.ref('orders/' + id).remove();
                                }
                            });
                            alert("Shift berhasil di-reset. Omzet kembali ke Rp 0.");
                        }
                    });
                } else {
                    alert("PIN Salah! Reset dibatalkan.");
                }
            }
        };
    </script>
</body>
</html>
