<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Sejuk | Dashboard Barista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0a; color: white; }
        .order-card { transition: all 0.3s ease; border: 1px solid #1f1f1f; }
        .status-pending { border-left: 6px solid #f97316; }
        .status-dibuat { border-left: 6px solid #3b82f6; }
        .status-selesai { border-left: 6px solid #22c55e; opacity: 0.6; }
        .animate-pop { animation: pop 0.4s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="p-6 pb-24">

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter uppercase">Barista Dash.</h1>
            <p id="connectionStatus" class="text-[10px] text-green-500 font-bold uppercase tracking-widest">• Live Connection Active</p>
        </div>
        <div class="text-right">
            <span id="orderCount" class="bg-white text-black px-5 py-2 rounded-full font-black text-xs">0 ORDERS</span>
        </div>
    </header>

    <div id="orderList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div id="loadingState" class="text-stone-700 animate-pulse">Menghubungkan ke pusat data...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAuo0evyLZRvqWSYwUxP30ET01ZPGoqJ4",
            authDomain: "kopi-sejuk.firebaseapp.com",
            databaseURL: "https://kopi-sejuk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kopi-sejuk",
            storageBucket: "kopi-sejuk.firebasestorage.app",
            messagingSenderId: "911072415848",
            appId: "1:911072415848:web:ae88ae6ae15250a1f42bdd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const alertSound = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3');
        let firstLoad = true;

        // FUNGSI REALTIME UTAMA
        db.ref('orders').on('value', (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('orderList');
            const counterElement = document.getElementById('orderCount'); // ID Target
            
            list.innerHTML = '';
            
            if (data) {
                // MENGHITUNG TOTAL ORDER SECARA REALTIME
                const totalOrderan = Object.keys(data).length; 
                counterElement.innerText = totalOrderan + " ORDERS"; // Update Angka Di Sini

                const keys = Object.keys(data).reverse(); 

                keys.forEach(id => {
                    const order = data[id];
                    const card = `
                        <div class="order-card bg-[#141414] p-6 rounded-[2rem] shadow-2xl animate-pop status-${order.status ? order.status.toLowerCase() : 'pending'}">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-extrabold text-lg text-white uppercase">${order.customer || 'Pelanggan'}</h3>
                                    <p class="text-orange-500 font-bold text-xs uppercase">Meja: ${order.table || '?'}</p>
                                </div>
                                <span class="text-[9px] text-stone-600 font-bold">${new Date(order.timestamp).toLocaleTimeString()}</span>
                            </div>

                            <div class="space-y-2 mb-6 py-4 border-y border-stone-900">
                                ${order.items ? Object.keys(order.items).map(item => `
                                    <div class="flex justify-between text-xs">
                                        <span class="text-stone-400">${item}</span>
                                        <span class="font-bold text-white">x${order.items[item].qty}</span>
                                    </div>
                                `).join('') : ''}
                            </div>

                            <div class="flex justify-between items-center mb-6">
                                <span class="text-[9px] font-bold text-stone-600 uppercase tracking-widest">Total Bill</span>
                                <span class="font-black text-orange-500">Rp ${order.total ? order.total.toLocaleString('id-ID') : '0'}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="updateStatus('${id}', 'Dibuat')" class="bg-orange-500 text-white py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Update</button>
                                <button onclick="deleteOrder('${id}')" class="bg-stone-900 text-stone-600 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Hapus</button>
                            </div>
                        </div>
                    `;
                    list.innerHTML += card;
                });

                if (!firstLoad) alertSound.play().catch(e => console.log("Sound blocked"));
                firstLoad = false;

            } else {
                list.innerHTML = '<p class="text-stone-800 italic text-sm">Belum ada pesanan hari ini...</p>';
                counterElement.innerText = "0 ORDERS"; // Balik ke 0 kalau database kosong
            }
        });

        window.updateStatus = (id, newStatus) => {
            db.ref('orders/' + id).update({ status: newStatus });
        };

        window.deleteOrder = (id) => {
            if(confirm('Hapus pesanan ini?')) {
                db.ref('orders/' + id).remove();
            }
        };
    </script>

</body>
</html>
