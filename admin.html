<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Sejuk | Dashboard Barista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .order-card { transition: all 0.3s ease; }
        .status-pending { border-left: 8px solid #f97316; }
        .status-done { border-left: 8px solid #22c55e; opacity: 0.7; }
    </style>
</head>
<body class="bg-[#121212] text-white p-6 pb-24">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-extrabold text-orange-500 tracking-tighter">BARISTA DASHBOARD</h1>
            <p class="text-stone-500 text-xs uppercase tracking-widest font-bold">Kopi Sejuk Management</p>
        </div>
        <div class="text-right">
            <span id="orderCount" class="bg-orange-500 text-white px-4 py-2 rounded-full font-black text-sm">0 ORDERS</span>
        </div>
    </header>

    <div id="orderList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        <p id="emptyState" class="text-stone-600 italic text-sm">Menunggu pesanan masuk...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // Konfigurasi Firebase Lu
        const firebaseConfig = {
            apiKey: "AIzaSyCAuo0evyLZRvqWSYwUxP30ET01ZPGoqJ4",
            authDomain: "kopi-sejuk.firebaseapp.com",
            databaseURL: "https://kopi-sejuk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kopi-sejuk",
            storageBucket: "kopi-sejuk.firebasestorage.app",
            messagingSenderId: "911072415848",
            appId: "1:911072415848:web:ae88ae6ae15250a1f42bdd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Suara Notifikasi
        const bell = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3');

        // Monitor Pesanan Masuk
        const ordersRef = ref(db, 'orders');
        onValue(ordersRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('orderList');
            const empty = document.getElementById('emptyState');
            
            if (data) {
                empty.style.display = 'none';
                list.innerHTML = '';
                let count = 0;

                // Sortir agar pesanan terbaru di atas (opsional)
                const sortedKeys = Object.keys(data).reverse();

                sortedKeys.forEach(id => {
                    const order = data[id];
                    count++;
                    
                    const card = `
                        <div class="order-card bg-stone-900 p-6 rounded-[2.5rem] ${order.status === 'Selesai' ? 'status-done' : 'status-pending'} shadow-xl">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-black text-xl text-white uppercase">${order.customer}</h3>
                                    <p class="text-orange-500 font-bold text-sm">Meja: ${order.table}</p>
                                </div>
                                <span class="text-[10px] text-stone-500 font-bold">${new Date(order.timestamp).toLocaleTimeString()}</span>
                            </div>

                            <div class="space-y-2 mb-6 border-y border-stone-800 py-4">
                                ${Object.keys(order.items).map(item => `
                                    <div class="flex justify-between text-sm">
                                        <span class="text-stone-300">${item} <b class="text-white">x${order.items[item].qty}</b></span>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="flex justify-between items-center mb-6">
                                <span class="text-[10px] font-bold text-stone-500 uppercase">Total Bill</span>
                                <span class="font-extrabold text-white">Rp ${order.total.toLocaleString('id-ID')}</span>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                ${order.status === 'Pending' ? 
                                    `<button onclick="updateStatus('${id}', 'Dibuat')" class="bg-white text-black py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-500 hover:text-white transition">Terima</button>` : 
                                    `<button onclick="updateStatus('${id}', 'Selesai')" class="bg-green-500 text-white py-3 rounded-2xl text-[10px] font-black uppercase">Selesaikan</button>`
                                }
                                <button onclick="deleteOrder('${id}')" class="bg-stone-800 text-stone-500 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition">Hapus</button>
                            </div>
                        </div>
                    `;
                    list.innerHTML += card;
                });
                document.getElementById('orderCount').innerText = count + " ORDERS";
                // Mainkan suara jika ada pesanan baru (logic sederhana)
                if(sortedKeys.length > parseInt(document.getElementById('orderCount').innerText)) bell.play();
            } else {
                list.innerHTML = '';
                empty.style.display = 'block';
                document.getElementById('orderCount').innerText = "0 ORDERS";
            }
        });

        // FUNGSI UPDATE STATUS
        window.updateStatus = (id, newStatus) => {
            update(ref(db, 'orders/' + id), { status: newStatus });
        };

        // FUNGSI HAPUS PESANAN
        window.deleteOrder = (id) => {
            if(confirm('Hapus pesanan ini dari database?')) {
                remove(ref(db, 'orders/' + id));
            }
        };

    </script>
</body>
</html>
